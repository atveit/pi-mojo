[workspace]
name = "pi-mojo"
version = "0.2.0"
authors = ["Amund Tveit <atveit@gmail.com>"]
channels = ["https://conda.modular.com/max-nightly", "conda-forge"]
platforms = ["osx-arm64"]

[dependencies]
mojo = ">=1.0.0b2.dev2026052406,<2"
python = ">=3.14.5,<3.15"

[tasks]
benchmark = "python src/benchmarks/benchmark_run.py"
example-ai = "mojo run -I src examples/example_basic_ai.mojo"
example-coding = "mojo run -I src examples/example_coding_agent.mojo"
test = "mojo run -I src tests/test_t2m_runtime.mojo && mojo run -I src tests/test_packages.mojo"
